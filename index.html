<!DOCTYPE html>
<html>
<head>
  <title>My AI</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #chat {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      height: 80vh;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #1a1a1a;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #2a2a2a;
      margin-right: auto;
      text-align: left;
    }

    .input-box {
      display: flex;
      max-width: 600px;
      margin: auto;
      padding: 10px;
      border-top: 1px solid #222;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 5px;
      outline: none;
    }

    button {
      padding: 10px;
      margin-left: 8px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Ask anything..." />
  <button id="sendBtn">Send</button>
  <button id="micBtn">🎤</button>
</div>

<script>
const inputEl = document.getElementById("input");
const chatEl = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");

/* ---------------- CHAT UI ---------------- */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

/* ---------------- SEND ---------------- */
async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage(text, "user");

  inputEl.value = "";
  transcriptBuffer = "";
  lastInterim = "";

  try {
    const res = await fetch("http://localhost:3000/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMessage(data.reply || "No response", "bot");

  } catch {
    addMessage("Server error", "bot");
  }
}

sendBtn.onclick = send;

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

/* ---------------- SPEECH ENGINE ---------------- */
const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;
let isListening = false;

let transcriptBuffer = "";
let lastInterim = "";
let restartLock = false;

function initSpeech() {
  if (!SpeechAPI) return null;

  const rec = new SpeechAPI();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = "en-US";

  rec.onresult = (event) => {
    let interim = "";
    let finalPart = "";

    for (let i = 0; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalPart += text + " ";
      } else {
        interim += text;
      }
    }

    if (finalPart && finalPart !== lastInterim) {
      transcriptBuffer += finalPart;
      lastInterim = finalPart;
    }

    inputEl.value = transcriptBuffer + interim;
  };

  rec.onend = () => {
    if (isListening && !restartLock) {
      restartLock = true;
      setTimeout(() => {
        restartLock = false;
        rec.start();
      }, 200);
    }
  };

  return rec;
}

recognition = initSpeech();

/* ---------------- MIC ---------------- */
micBtn.onclick = () => {
  if (!recognition) {
    alert("Speech not supported in this browser");
    return;
  }

  if (!isListening) {
    isListening = true;
    transcriptBuffer = "";
    lastInterim = "";
    recognition.start();
    micBtn.style.background = "#666";
  } else {
    isListening = false;
    recognition.stop();
    micBtn.style.background = "#333";
  }
};
</script>

</body>
</html>
