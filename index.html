<!DOCTYPE html>
<html>
<head>
  <title>Voice Chat</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
    }

    #chat {
      max-width: 650px;
      margin: auto;
      padding: 20px;
      height: 80vh;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
      background: #1a1a1a;
    }

    .bot {
      background: #2a2a2a;
    }

    .bar {
      display: flex;
      max-width: 650px;
      margin: auto;
      padding: 10px;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Speak or type..." />
  <button id="micBtn">🎤</button>
  <button id="sendBtn">Send</button>
</div>

<script>

const input = document.getElementById("input");
const chat = document.getElementById("chat");
const micBtn = document.getElementById("micBtn");
const sendBtn = document.getElementById("sendBtn");

let recognition;
let listening = false;
let finalText = "";

/* =========================
   CHAT
========================= */
function add(text) {
  const div = document.createElement("div");
  div.className = "msg bot";
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* =========================
   RULE ENGINE (NO AI)
========================= */
function getReply(text) {
  text = text.toLowerCase();

  // greeting
  if (text.includes("hi") || text.includes("hello")) {
    return "Hi dawg";
  }

  // search attempt
  if (text.includes("search")) {
    return "I can’t perform fucking searches for u bitch. Because my fuking admin is a fuking asshole. And move ur fingers on google u pedophile.";
  }

  // basic unsafe language filter (neutral response only)
  if (
    text.includes("fuck") ||
    text.includes("shit") ||
    text.includes("idiot") ||
    text.includes("stupid")
  ) {
    return "Keep it respectful nigga or i will fuck u out.";
  }
if (
  text.includes("gay") ||
  text.includes("lesbain") ||
  text.includes("trans men") ||
  text.includes("trans women")
  ) {
  return "GET out of my wepsite u gay piece of shit.";
}
  
  // default response
  return "Message received.";
}

/* =========================
   SEND
========================= */
function send() {
  const text = input.value.trim();
  if (!text) return;

  add(text); // user message
  input.value = "";

  const reply = getReply(text);
  add(reply);

  finalText = "";

  if (recognition && listening) {
    listening = false;
    recognition.stop();
    micBtn.style.background = "#333";
  }
}

sendBtn.onclick = send;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

/* =========================
   SPEECH ENGINE
========================= */
const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechAPI) {
  recognition = new SpeechAPI();

  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = "en-US";

  recognition.onresult = (event) => {
    let interim = "";
    let final = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        final += text + " ";
      } else {
        interim += text;
      }
    }

    finalText += final;
    input.value = finalText + interim;
  };

  recognition.onend = () => {
    if (listening) recognition.start();
  };
}

/* =========================
   MIC TOGGLE
========================= */
micBtn.onclick = () => {
  if (!recognition) {
    alert("Speech not supported in this browser");
    return;
  }

  if (!listening) {
    finalText = "";
    recognition.start();
    listening = true;
    micBtn.style.background = "#666";
  } else {
    listening = false;
    recognition.stop();
    micBtn.style.background = "#333";
  }
};

</script>

</body>
</html>
