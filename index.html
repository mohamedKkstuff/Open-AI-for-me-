<!DOCTYPE html>
<html>
<head>
  <title>My AI</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
    }

    #chat {
      max-width: 650px;
      margin: auto;
      padding: 20px;
      height: 80vh;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user { background: #1a1a1a; margin-left: auto; }
    .bot { background: #2a2a2a; }

    .bar {
      display: flex;
      max-width: 650px;
      margin: auto;
      padding: 10px;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Type or speak..." />
  <button id="mic">🎤</button>
  <button id="send">Send</button>
</div>

<script>

const input = document.getElementById("input");
const chat = document.getElementById("chat");
const micBtn = document.getElementById("mic");
const sendBtn = document.getElementById("send");

let recognition;
let listening = false;
let finalText = "";

/* =========================
   CHAT UI
========================= */
function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* =========================
   SEND (INSTANT, NO AI)
========================= */
function send() {
  const text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  finalText = ""; // reset speech buffer
}

sendBtn.onclick = send;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

/* =========================
   SPEECH (FIXED + FAST)
========================= */
const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechAPI) {
  recognition = new SpeechAPI();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = "en-US";

  recognition.onresult = (event) => {
    let interim = "";
    let final = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        final += text + " ";
      } else {
        interim += text;
      }
    }

    finalText += final;
    input.value = finalText + interim; // instant feel
  };
}

/* =========================
   MIC TOGGLE
========================= */
micBtn.onclick = () => {
  if (!recognition) {
    alert("Speech not supported");
    return;
  }

  if (!listening) {
    finalText = "";
    recognition.start();
    listening = true;
    micBtn.style.background = "#666";
  } else {
    recognition.stop();
    listening = false;
    micBtn.style.background = "#333";
  }
};

</script>

</body>
</html>
