<!DOCTYPE html>
<html>
<head>
  <title>My AI</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #chat {
      max-width: 650px;
      margin: auto;
      padding: 20px;
      height: 80vh;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.4;
    }

    .user {
      background: #1a1a1a;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #2a2a2a;
      margin-right: auto;
      text-align: left;
    }

    .input-box {
      display: flex;
      max-width: 650px;
      margin: auto;
      padding: 10px;
      border-top: 1px solid #222;
      align-items: center;
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 5px;
      outline: none;
    }

    button {
      padding: 10px;
      margin-left: 8px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Ask anything..." />
  <button id="sendBtn">Send</button>
  <button id="micBtn">🎤</button>
</div>

<script>

/* =========================
   ELEMENTS
========================= */

const inputEl = document.getElementById("input");
const chatEl = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");

/* =========================
   CHAT SYSTEM
========================= */

function addMessage(text, type) {
  const el = document.createElement("div");
  el.className = "msg " + type;
  el.textContent = text;
  chatEl.appendChild(el);
  chatEl.scrollTop = chatEl.scrollHeight;
}

/* =========================
   STATE
========================= */

const speechState = {
  listening: false,
  committed: ""
};

/* =========================
   RESET
========================= */

function resetAll() {
  speechState.committed = "";
  inputEl.value = "";
}

/* =========================
   SEND LOGIC
========================= */

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage(text, "user");

  resetAll();

  if (recognition) recognition.abort();

  try {
    const res = await fetch("http://localhost:3000/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMessage(data.reply || "No response", "bot");

  } catch {
    addMessage("Server error", "bot");
  }
}

sendBtn.onclick = send;

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

/* =========================
   SPEECH ENGINE (FIXED MODEL)
========================= */

const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = null;

function createSpeech() {
  if (!SpeechAPI) return null;

  const rec = new SpeechAPI();

  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = "en-US";

  let lastFinal = "";

  rec.onresult = (event) => {

    let interim = "";
    let final = "";

    for (let i = 0; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        final += text + " ";
      } else {
        interim += text;
      }
    }

    if (final !== lastFinal) {
      speechState.committed += final;
      lastFinal = final;
    }

    inputEl.value = speechState.committed + interim;
  };

  rec.onend = () => {
    if (speechState.listening) {
      setTimeout(() => rec.start(), 200);
    }
  };

  return rec;
}

recognition = createSpeech();

/* =========================
   MIC CONTROL
========================= */

micBtn.onclick = () => {

  if (!recognition) {
    alert("Speech not supported in this browser");
    return;
  }

  if (!speechState.listening) {
    speechState.listening = true;

    resetAll();

    recognition.start();

    micBtn.style.background = "#666";

  } else {
    speechState.listening = false;

    recognition.stop();

    micBtn.style.background = "#333";
  }
};

</script>

</body>
</html>
