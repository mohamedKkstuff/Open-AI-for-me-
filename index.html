<!DOCTYPE html>
<html>
<head>
  <title>My AI</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    #chat {
      max-width: 600px;
      margin: auto;
      padding: 20px;
      height: 80vh;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #1a1a1a;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #2a2a2a;
      margin-right: auto;
      text-align: left;
    }

    .input-box {
      display: flex;
      max-width: 600px;
      margin: auto;
      padding: 10px;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 5px;
      outline: none;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const inputEl = document.getElementById("input");
  const input = inputEl.value.trim();
  const chat = document.getElementById("chat");

  if (!input) return;

  chat.innerHTML += '<div class="msg user">' + input + '</div>';
  inputEl.value = "";
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("http://localhost:3000/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: input })
    });

    const data = await res.json();

    chat.innerHTML += '<div class="msg bot">' + data.reply + '</div>';
    chat.scrollTop = chat.scrollHeight;
  } catch {
    chat.innerHTML += '<div class="msg bot">Server error</div>';
  }
}

document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
