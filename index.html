<!DOCTYPE html>
<html>
<head>
  <title>My AI</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
    }

    #chat {
      max-width: 700px;
      margin: auto;
      padding: 20px;
      height: 80vh;
      overflow-y: auto;
    }

    .msg {
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user { background: #1a1a1a; margin-left: auto; }
    .bot { background: #2a2a2a; }

    .bar {
      display: flex;
      max-width: 700px;
      margin: auto;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 6px;
    }

    button {
      margin-left: 8px;
      padding: 10px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Speak or type..." />
  <button id="mic">🎤</button>
  <button id="send">Send</button>
</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const micBtn = document.getElementById("mic");
const sendBtn = document.getElementById("send");

/* =========================
   CHAT UI
========================= */

function add(text, type) {
  const el = document.createElement("div");
  el.className = "msg " + type;
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

/* =========================
   AI REQUEST
   (YOU MUST ADD YOUR API KEY)
========================= */

async function askAI(text) {
  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer YOUR_API_KEY"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();
  return data.choices[0].message.content;
}

/* =========================
   SEND MESSAGE
========================= */

async function send() {
  const text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  const reply = await askAI(text);
  add(reply, "bot");
}

sendBtn.onclick = send;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

/* =========================
   MICROPHONE (SIMPLE + STABLE)
========================= */

const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;

if (SpeechAPI) {
  rec = new SpeechAPI();
  rec.continuous = false;
  rec.interimResults = false;
  rec.lang = "en-US";

  rec.onresult = (e) => {
    input.value = e.results[0][0].transcript;
  };
}

let listening = false;

micBtn.onclick = () => {
  if (!rec) return alert("Speech not supported");

  if (!listening) {
    rec.start();
    listening = true;
  } else {
    rec.stop();
    listening = false;
  }
};

</script>

</body>
</html>
